# Server
server.port=8080

# Database - set these via environment variables in production
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/banddb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# CORS - comma-separated origins (defaults to * for local dev)
cors.allowed-origins=${CORS_ORIGINS:*}

# JWT - must be at least 32 characters; set JWT_SECRET env var in production
jwt.secret=${JWT_SECRET:local-dev-secret-change-this-in-prod}
