# Server
server.port=8080

# Actuator — expose only health for the App Runner health check
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Database - set these via environment variables in production
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/banddb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool — keep small; the shared db.t3.micro caps ~112 connections (fleet rule B5.4)
spring.datasource.hikari.maximum-pool-size=5

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# CORS — comma-separated origins. No wildcard default: prod MUST set CORS_ORIGINS or cross-origin
# requests are blocked (fail-closed). The local profile overrides this with localhost:5173.
cors.allowed-origins=${CORS_ORIGINS:}

# JWT - must be at least 32 characters; set JWT_SECRET env var in production
jwt.secret=${JWT_SECRET:local-dev-secret-change-this-in-prod}

# Admin seed - set both to create the initial admin on first startup
admin.email=${ADMIN_EMAIL:}
admin.password=${ADMIN_PASSWORD:}

# YourArea community
# Base URL the emailed magic links point at (the frontend's verify page)
community.magic-link.base-url=${APP_BASE_URL:${MAGIC_LINK_BASE_URL:http://localhost:5173}}
community.magic-link.ttl-minutes=15
community.email.from=${EMAIL_FROM:}
# Comma-separated word blocklist; matched words are starred out at write time
community.word-filter.blocklist=${WORD_FILTER_BLOCKLIST:damn,hell,shit,fuck,bitch,asshole,crap}
# Official villxin account seed — set OFFICIAL_EMAIL to create it on startup
community.official.email=${OFFICIAL_EMAIL:}
community.official.username=${OFFICIAL_USERNAME:villxin}

# Stripe - set all three via environment variables in production
stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
stripe.success-url=${STRIPE_SUCCESS_URL:http://localhost:5173/shop/success}
stripe.cancel-url=${STRIPE_CANCEL_URL:http://localhost:5173/shop}
