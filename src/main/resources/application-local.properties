# Local development profile — activate with: --spring.profiles.active=local
# Override only what differs from application.properties defaults.

# Show SQL for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Verbose logging for local development
logging.level.com.villxin.bandapi=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.flywaydb=DEBUG

# CORS — allow the Vite dev server
cors.allowed-origins=http://localhost:5173

# Stripe redirects point to local frontend (hash-routed SPA)
stripe.success-url=http://localhost:5173/#/store/success
stripe.cancel-url=http://localhost:5173/#/store
