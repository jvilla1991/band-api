services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: banddb
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d banddb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
