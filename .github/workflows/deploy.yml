name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  JAVA_VERSION: "21"

jobs:
  # ── Test ────────────────────────────────────────────────────────────────────
  # BandApiApplicationTests boots the context against a real Postgres via
  # Testcontainers, so Flyway runs the actual migrations and ddl-auto=validate
  # checks the entities. GitHub's ubuntu-latest runners have a Docker daemon, so
  # the container starts here (the Docker image build can't run it — no daemon).
  test:
    name: Test (Testcontainers Postgres)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run tests
        run: ./mvnw test -B

  # ── Build, push & deploy ────────────────────────────────────────────────────
  build-and-deploy:
    name: Build, push & deploy
    runs-on: ubuntu-latest
    needs: test
    # Runs in the "production" GitHub Environment so the OIDC token subject is
    # repo:<org>/<repo>:environment:production — matching the deploy role's trust
    # policy created by modules/backend-service (CONVENTIONS §8.2).
    environment: production

    permissions:
      id-token: write   # required for OIDC
      contents: read

    steps:
      - uses: actions/checkout@v4

      # ── AWS / ECR ─────────────────────────────────────────────────────────────

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build & push ──────────────────────────────────────────────────────────
      # Multi-stage Dockerfile: Maven build (tests skipped — see the test job) then
      # a slim JRE runtime. Deploy the immutable :<sha> tag, never :latest (§8.4).

      - name: Build & push Docker image
        env:
          IMAGE_URI: ${{ secrets.ECR_REPOSITORY_URL }}
        run: |
          docker build -t "$IMAGE_URI:${{ github.sha }}" .
          docker push "$IMAGE_URI:${{ github.sha }}"

      # ── Deploy to App Runner ──────────────────────────────────────────────────
      # auto_deployments_enabled = false in Terraform, so we trigger the pull of the
      # new SHA-tagged image explicitly via update-service.

      - name: Deploy to App Runner
        run: |
          aws apprunner update-service \
            --service-arn "${{ secrets.APPRUNNER_SERVICE_ARN }}" \
            --source-configuration "{
              \"ImageRepository\": {
                \"ImageIdentifier\": \"${{ secrets.ECR_REPOSITORY_URL }}:${{ github.sha }}\",
                \"ImageRepositoryType\": \"ECR\"
              },
              \"AutoDeploymentsEnabled\": false
            }" \
            --region "$AWS_REGION"

      - name: Wait for App Runner deployment
        run: |
          echo "Waiting for App Runner service to reach RUNNING state..."
          for i in $(seq 1 30); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "${{ secrets.APPRUNNER_SERVICE_ARN }}" \
              --query "Service.Status" \
              --output text \
              --region "$AWS_REGION")
            echo "  [$i/30] Status: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "Deployment complete."
              break
            fi
            if [ "$STATUS" = "CREATE_FAILED" ] || \
               [ "$STATUS" = "UPDATE_FAILED" ] || \
               [ "$STATUS" = "DELETE_FAILED" ]; then
              echo "Deployment failed with status: $STATUS"
              exit 1
            fi
            if [ "$i" = "30" ]; then
              echo "Timed out after 10 minutes waiting for deployment."
              exit 1
            fi
            sleep 20
          done

      # ── Smoke test ────────────────────────────────────────────────────────────
      # "RUNNING" only means App Runner started the container, not that the app is
      # healthy. Hit the real health endpoint and fail the run if it isn't 200 (§8.5).

      - name: Smoke test
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${{ secrets.APPRUNNER_SERVICE_URL }}/actuator/health")
          echo "Health check returned HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Health check failed."
            exit 1
          fi
          echo "Deployment verified."
